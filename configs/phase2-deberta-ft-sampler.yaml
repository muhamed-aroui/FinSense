# Config for phase2-deberta-ft-sampler

phase: 2
run_id: "phase2-deberta-ft-sampler"
model: "microsoft/deberta-v3-base"
method: "full_ft"
head: "linear"
imbalance_strategy: "sampler"

dataset: "zeroshot/twitter-financial-news-sentiment"
splits_file: "src/finsense/data/splits/phase0_v1.json"
max_length: 64
preprocessing:
  strip_urls: true
  collapse_whitespace: true

seed: 42
max_epochs: 5
early_stopping_patience: 2
batch_size: 32
learning_rate: 2.0e-5
optimizer: "adamw"
weight_decay: 0.01
lr_scheduler: "cosine"
warmup_ratio: 0.1

precision: "bf16"
max_wall_clock_min: 30
vram_budget_gb: 8
checkpoint_every_epoch: true
output_dir: "artifacts/phase2-deberta-ft-sampler"
deterministic: true
cublas_workspace_config: ":4096:8"
