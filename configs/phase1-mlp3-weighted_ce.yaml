# Config for phase1-mlp3-weighted_ce

phase: 1
run_id: "phase1-mlp3-weighted_ce"
model: "microsoft/deberta-v3-base"
head: "mlp3"
imbalance_strategy: "weighted_ce"

dataset: "zeroshot/twitter-financial-news-sentiment"
splits_file: "src/finsense/data/splits/phase0_v1.json"
max_length: 64
preprocessing:
  strip_urls: true
  collapse_whitespace: true

seed: 42
max_epochs: 30
early_stopping_patience: 5
batch_size: 64
learning_rate: 3.0e-4
optimizer: "adamw"
weight_decay: 0.01
lr_scheduler: "cosine"
warmup_ratio: 0.1

head_config:
  hidden_dims: [512, 128]
  dropout: 0.1

class_weights: balanced

precision: "bf16"
max_wall_clock_min: 60
vram_budget_gb: 10
checkpoint_every_epoch: true
output_dir: "artifacts/phase1-mlp3-weighted_ce"
deterministic: true
cublas_workspace_config: ":4096:8"
